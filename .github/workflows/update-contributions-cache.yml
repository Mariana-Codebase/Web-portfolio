# Actualiza public/contributions-cache.json cada 10 minutos.
# La API sirve ese archivo al instante; este job lo refresca.
name: Update contributions cache

on:
  schedule:
    - cron: "*/10 * * * *"   # cada 10 minutos
  workflow_dispatch:          # permite lanzar a mano

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update contributions cache
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          export SITE_URL="${SITE_URL:-https://mariana-dev-portfolio.vercel.app}"
          node scripts/update-contributions-cache.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/contributions-cache.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: refresh contributions cache"
            git push
          fi
